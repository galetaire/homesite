    const decades = [
        { label: '1980–1989', color: 'rgba(34, 197, 94,  0.6)', border: 'rgba(34, 197, 94,  1)', from: 1980, to: 1989 },
        { label: '1990–1999', color: 'rgba(239, 68, 68,  0.6)', border: 'rgba(239, 68, 68,  1)', from: 1990, to: 1999 },
        { label: '2000–2009', color: 'rgba(59, 130, 246, 0.6)', border: 'rgba(59, 130, 246, 1)', from: 2000, to: 2009 },
        { label: '2010–2019', color: 'rgba(168, 85, 247, 0.6)', border: 'rgba(168, 85, 247, 1)', from: 2010, to: 2019 },
        { label: '2020–2026', color: 'rgba(180, 83, 9,   0.6)', border: 'rgba(180, 83, 9,   1)', from: 2020, to: 2026 },
    ];

    const datasets = decades.map(d => ({
        label: d.label,
        data: allData.filter(p => p.year >= d.from && p.year <= d.to),
        backgroundColor: d.color,
        borderColor: d.border,
        borderWidth: 1
    }));

    const annotationLinePlugin = {
        id: 'annotationLines',
        afterDraw(chart) {
            const { ctx, scales: { x, y } } = chart;
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.7)';
            ctx.lineWidth = 1.5;

            // Horizontal line at y=60
            const yPixel = y.getPixelForValue(60);
            ctx.beginPath();
            ctx.moveTo(x.left, yPixel);
            ctx.lineTo(x.right, yPixel);
            ctx.stroke();

            // Vertical line at x=2.25
            const xPixel = x.getPixelForValue(2.25);
            ctx.beginPath();
            ctx.moveTo(xPixel, y.top);
            ctx.lineTo(xPixel, y.bottom);
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.font = '11px sans-serif';
            ctx.fillStyle = 'rgba(80, 80, 80, 0.9)';

            // Label for horizontal line
            ctx.textAlign = 'left';
            ctx.fillText('', x.right + 4, yPixel + 4);

            // Label for vertical line
            ctx.textAlign = 'center';
            ctx.fillText('', xPixel, y.bottom + 20);

            ctx.restore();
        }
    };

    const ctx = document.getElementById('bubbleChart').getContext('2d');
    new Chart(ctx, {
        type: 'bubble',
        data: { datasets },
        plugins: [annotationLinePlugin],
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'top' },
                tooltip: {
                    callbacks: {
                        label: function (context) {
                            const d = context.raw;
                            return `${d.year} — GDP: ${d.x}, Pressure: ${d.y.toFixed(2)}`;
                        }
                    }
                },
                datalabels: {
                    formatter: (value) => value.year,
                    font: { size: 9 },
                    color: '#333',
                    anchor: 'center',
                    align: 'center',
                }
            },
            scales: {
                x: {
                    title: { display: true, text: 'PIB Espanya' },
                    ticks: {
                        callback: (value) => value.toFixed(2)
                    }
                },
                y: {
                    title: { display: true, text: 'Market Cap House' },
                    ticks: {
                        callback: (value) => value.toFixed(1)
                    }
                }
            }
        }
    });
